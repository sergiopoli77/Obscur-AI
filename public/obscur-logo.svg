    <polygon points="0,-58 58,0 0,58 -58,0" fill="#0B0D11"/>
    <circle cx="0" cy="0" r="14" fill="url(#accent)"/>
  </g>

  <text x="256" y="370" text-anchor="middle" fill="#E8ECF3" font-family="Sora, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="0.5">Obscur AI</text>
