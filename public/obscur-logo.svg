<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Obscur AI logo">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0B0D11"/>
      <stop offset="100%" stop-color="#141922"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#C69026"/>
      <stop offset="100%" stop-color="#E1B34A"/>
    </linearGradient>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="100" fill="url(#bg)"/>
  <rect x="24" y="24" width="464" height="464" rx="100" fill="none" stroke="#2A3342" stroke-width="8"/>

  <g transform="translate(256 206)">
